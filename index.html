<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>岡本 奎一 | 未来志創プロジェクト</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 立山連峰と教育への光をイメージしたカラーパレット */
            --primary-blue: #005A9C;  /* 信頼・教育の軸となる深い青 */
            --sky-blue: #4FC3F7;      /* 立山の澄んだ空と希望の水色 */
            --accent-sun: #F39C12;    /* 志・子どもたちを照らす光のオレンジゴールド */
            --bg-light: #F0F8FF;      /* 雪や雲を思わせる爽やかな背景色 */
            --text-main: #333333;
            
            /* SNSブランドカラー */
            --color-line: #06C755;
            --color-facebook: #1877F2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #e6f2f9; /* PCで見た時の外側の背景色（薄い水色） */
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- メインコンテナ（スマホ最適化＆PC中央配置） --- */
        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 25px rgba(0, 90, 156, 0.1);
            padding-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        /* --- ファーストビュー（Hero Section） --- */
        .hero {
            position: relative;
            padding: 3rem 1.5rem 2rem;
            /* 立山の空をイメージした爽やかなグラデーション */
            background: linear-gradient(135deg, var(--bg-light) 0%, #FFFFFF 100%);
            text-align: center;
            border-bottom: 4px solid var(--sky-blue);
        }

        /* 教育への思い（温かい太陽の光）を表現する装飾 */
        .hero::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }
        
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(79, 195, 247, 0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0, 90, 156, 0.15);
            margin-bottom: 1rem;
            background-color: var(--sky-blue);
            /* ▼ ここにご自身の写真URLを入れてください ▼ */
            background-image: url('https://via.placeholder.com/150/4FC3F7/FFFFFF?text=Profile'); 
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 2;
        }

        .hero-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary-blue);
            margin-bottom: 0.2rem;
            letter-spacing: 0.05em;
            position: relative;
            z-index: 2;
        }

        .hero-subtitle {
            font-size: 0.85rem;
            color: var(--accent-sun);
            font-weight: 700;
            margin-bottom: 1.2rem;
            position: relative;
            z-index: 2;
        }

        .hero-desc {
            font-size: 0.9rem;
            color: #444;
            text-align: justify;
            text-justify: inter-ideograph;
            padding: 0 0.5rem;
            position: relative;
            z-index: 2;
        }

        /* --- SNSアイコンセクション --- */
        .sns-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: -1.5rem auto 2.5rem;
            position: relative;
            z-index: 10;
        }

        .sns-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 1.6rem;
            box-shadow: 0 5px 15px rgba(0, 90, 156, 0.15);
            transition: transform 0.2s;
            border: 2px solid #fff;
        }

        .sns-btn:active {
            transform: scale(0.9);
        }

        .sns-line { background-color: var(--color-line); }
        .sns-facebook { background-color: var(--color-facebook); }
        .sns-instagram {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
        }

        /* --- リンクボタンセクション --- */
        .links-container {
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1.2rem 1rem;
            background-color: #fff;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            border: 2px solid var(--bg-light);
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0, 90, 156, 0.05);
        }

        /* ボタン内のアイコン設定 */
        .link-btn i {
            margin-right: 0.6rem;
            font-size: 1.2rem;
            color: var(--sky-blue);
        }

        /* ボタンのタップ効果 */
        .link-btn:active {
            background-color: var(--bg-light);
            border-color: var(--sky-blue);
            transform: scale(0.98);
        }

        /* メイン事業のボタン（深い青） */
        .link-btn.highlight {
            background-color: var(--primary-blue);
            color: #fff;
            border: none;
            box-shadow: 0 5px 15px rgba(0, 90, 156, 0.2);
        }
        .link-btn.highlight i {
            color: var(--sky-blue);
        }

        /* 活気・情熱を伝えるイベント等のボタン（太陽のオレンジ） */
        .link-btn.sun {
            background: linear-gradient(135deg, #F5AF19 0%, #F12711 100%);
            color: #fff;
            border: none;
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }
        .link-btn.sun i {
            color: #fff;
        }

        /* フッター */
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero">
            <div class="profile-img"></div>
            <h1 class="hero-title">岡本 奎一</h1>
            <p class="hero-subtitle">未来志創プロジェクト 代表 / 子育てコーチング</p>
            <p class="hero-desc">
                元公立中学校教員10年。<br>
                「愛情の掛け違い」による親子のすれ違いをなくすため独立。素質論とメンタルコーチングを掛け合わせ、悩み苦しむ親御さんの『安全基地』を作る伴走者です。すべての子どもたちが自分の価値を信じ、志を持って生きられる社会を創ります。
            </p>
        </header>

        <div class="sns-container">
            <a href="#" class="sns-btn sns-instagram" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
            <a href="#" class="sns-btn sns-facebook" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="sns-btn sns-line" target="_blank" rel="noopener noreferrer"><i class="fab fa-line"></i></a>
        </div>

        <div class="links-container">
            
            <a href="#" class="link-btn sun">
                <i class="fas fa-fire"></i>
                【8/1 開催】誇高MATSURI in 富山
            </a>

            <a href="#" class="link-btn highlight">
                <i class="fas fa-seedling"></i>
                子育て・夫婦の伴走支援プログラム
            </a>

            <a href="#" class="link-btn">
                <i class="fas fa-comments"></i>
                【単発】素質論 個別アドバイス
            </a>

            <a href="#" class="link-btn">
                <i class="fas fa-school"></i>
                オンライン寺子屋「ほーむBASE」
            </a>

            <a href="#" class="link-btn">
                <i class="fas fa-globe"></i>
                公式ホームページを見る
            </a>
            
        </div>

        <footer>
            &copy; 2026 未来志創プロジェクト
        </footer>
    </div>

</body>
</html>
